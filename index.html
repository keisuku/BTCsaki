<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTCsaki — シグナルチャート &amp; 最強bot</title>
<meta name="description" content="人気シグナル戦略10種をバックテストで自動選抜し、チャンピオンbotのトレードをチャートで可視化">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <h1>📈 BTCsaki</h1>
    <div class="tabs" id="coinTabs"></div>
    <div class="tabs" id="tfTabs"></div>
    <div class="ticker">
      <span id="livePrice">—</span>
      <span id="liveChange" class="change"></span>
      <span id="fgBadge"></span>
    </div>
  </div>

  <div class="panel signal-panel wait" id="signalPanel">
    <div id="signalVerdict">分析中…</div>
    <div id="signalDetail"></div>
    <div id="signalMeta"></div>
  </div>

  <div class="panel">
    <div id="mainChart"></div>
  </div>

  <div class="panel" id="progressWrap">
    <div class="progress-track"><div id="progressBar"></div></div>
    <span id="progressText">起動中…</span>
    <span id="optimizedAt"></span>
  </div>

  <div class="panel">
    <h2>🏆 戦略リーダーボード(検証期間の成績 — 行クリックでチャートに反映)</h2>
    <div class="lb-scroll">
      <table>
        <thead>
          <tr>
            <th>戦略</th><th>パラメータ</th><th>回数</th><th>勝率</th>
            <th>PnL</th><th>PF</th><th>Sharpe</th><th>最大DD</th>
          </tr>
        </thead>
        <tbody id="lbBody"><tr><td colspan="8" class="muted">分析待ち…</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="panel">
    <h2>💰 エクイティカーブ(▼マーカー以降が検証期間 = 未知データでの成績)</h2>
    <div id="equityChart"></div>
  </div>

  <footer>
    データ: Binance Public API · Fear &amp; Greed: alternative.me<br>
    バックテスト結果は将来の利益を保証しません。投資助言ではありません。
  </footer>

</div>

<script type="module" src="js/app.js"></script>
<script>
// Re-register the (now self-destructing) service worker so legacy caches get purged.
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
